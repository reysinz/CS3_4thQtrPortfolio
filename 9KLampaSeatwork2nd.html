<!DOCTYPE html>
<html>
<head>
  <meta name="author" content="<your names>" />
  <meta name="revised" content="<date today>" />
  <style>
    body { font-family: Arial, sans-serif; }
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }
    .footer {
       opacity: 0.5;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .sidebar {
      background: lightgreen;
      width: 150px;
      height: 200px;
      position: relative; 
      top: 20px; 
      left: 20px;
    }
    
    .content {
      background: lightyellow;
      width: 300px;
      height: 200px;
      position: absolute;
      top: 66px;
      left: 200px;
    }    
    
    .notice {
    position: absolute;
    top: 60px;
    left: 400px;
    background: orange;
    padding: 10px;
    z-index: 2;
    }
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Main Content</div>
  <div class="footer">Footer</div>
  <div class="notice">Notice!</div>
  <!-- 
  Step 1: 
  Relative positioning lets you position things more specifically using top, bottom, right, and left

  Step 2:
  The footer stays at the bottom of the screen when we use "fixed", which lets the element stay in place and not move with the screen

  Step 3:
  Position absolute makes it so that the element moves relative to the parent container, unlike footer, which makes the element move relative to the screen

  Step 4:
  It appears on top due to the z-index value being greater. The z-index value determines how an element will look when it overlaps with another element
  
  
  
  -->
</body>
</html>
